name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          node --version

      # Sparkle ships sign_update inside its (deprecated) cask. We pull it
      # via brew, clear the quarantine xattr so Gatekeeper doesn't gate
      # us out, and let scripts/update-appcast.sh reach it.
      - name: Install Sparkle CLI tools
        run: |
          brew install --cask sparkle || brew install --cask sparkle --force
          sudo xattr -dr com.apple.quarantine /opt/homebrew/Caskroom/sparkle 2>/dev/null || true
          ls /opt/homebrew/Caskroom/sparkle/*/bin/sign_update

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/exec \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Used by scripts/update-appcast.sh during prepareCmd. Optional —
          # script no-ops if missing so first releases work without Sparkle.
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          # Used by scripts/bump-cask.sh during successCmd to push to the
          # Juanipis/homebrew-tap repo. Optional — bump-cask exits cleanly
          # if the secret is missing.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: npx semantic-release
