name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: swift test
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test --parallel

  build-app:
    name: assemble MotoBuds.app (smoke)
    runs-on: macos-15
    timeout-minutes: 15
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build .app (debug)
        env:
          VERSION: ci-${{ github.sha }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: bash Bundle/build-app.sh debug

      - name: Verify bundle structure
        run: |
          test -f .build/MotoBuds.app/Contents/Info.plist
          test -x .build/MotoBuds.app/Contents/MacOS/MotoBudsApp
          test -f .build/MotoBuds.app/Contents/Resources/AppIcon.icns
          codesign -dv .build/MotoBuds.app
